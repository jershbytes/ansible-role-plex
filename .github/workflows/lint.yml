name: lint

on:
  push:
    branches:
      - '*'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: 3.14.6
      - run: |
          pip install -r requirements-ansible.txt
          ansible-lint
