---
- name: Configure Plex repository
  ansible.builtin.template:
    src: plex.repo.j2
    dest: /etc/yum.repos.d/plex.repo
    mode: "0644"
  register: plex_repo_template

- name: Install Plex Server
  ansible.builtin.dnf:
    name: plexmediaserver
    state: present
    # Bypass the strict crypto validation block for the actual RPM signature match
    update_cache: true
  notify:
    - Reload systemd
    - Start and enable plexmediaserver

- name: Add firewalld rule
  ansible.posix.firewalld:
    service: plex
    permanent: true
    immediate: true
    state: enabled
